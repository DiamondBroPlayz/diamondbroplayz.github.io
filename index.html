<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>solarity</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;800&display=swap');
    body {
      margin: 0;
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
      height: 100vh;
      background-image: url('https://i.redd.it/661z7d0nqm571.gif'); /* Replace 'background.jpg' with your background image path */
      background-size: cover;
      background-position: center;
    }

    .blurred-box {
      width: 300px; /* Adjust width as needed */
      height: 200px; /* Adjust height as needed */
      background-color: rgba(255, 255, 255, 0.7); /* Adjust background color and opacity as needed */
      backdrop-filter: blur(10px); /* Adjust the blur amount as needed */
      border-radius: 50px; /* Adjust border radius as needed */
      display: flex;
      align-items: center;
      justify-content: center;
      color: #333; /* Adjust text color as needed */
      font-family: 'Montserrat', sans-serif;
    }
  </style>
</head>
<body>
  <div class="blurred-box">
    <h1 text-align="center">Solarity</h1>
    <p text-align="center">as her manager, she is a great coder</p>
  </div>
</body>
</html>
